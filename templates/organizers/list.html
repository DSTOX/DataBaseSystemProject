{% extends "base.html" %}
{% block content %}
<h1>Organizers</h1>
<a class="btn" href="{{ url_for('new_organizer') }}">+ New Organizer</a>
<table>
    <thead>
        <tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr>
    </thead>
    <tbody>
    {% for o in organizers %}
        <tr>
            <td>{{ o.full_name }}</td>
            <td>{{ o.email }}</td>
            <td>{{ o.role }}</td>
            <td>
                <a href="{{ url_for('edit_organizer', organizer_id=o.organizer_id) }}">Edit</a> |
                <form method="POST" action="{{ url_for('delete_organizer', organizer_id=o.organizer_id) }}" style="display:inline">
                    <button type="submit" onclick="return confirm('Delete organizer?')">Delete</button>
                </form>
            </td>
        </tr>
    {% else %}
        <tr><td colspan="4">No organizers yet.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
