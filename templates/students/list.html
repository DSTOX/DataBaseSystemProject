{% extends "base.html" %}
{% block content %}
<h1>Students</h1>
<a class="btn" href="{{ url_for('new_student') }}">+ New Student</a>
<table>
    <thead><tr><th>Name</th><th>Email</th><th>Major</th><th>Grad Year</th><th>Actions</th></tr></thead>
    <tbody>
    {% for s in students %}
        <tr>
            <td>{{ s.full_name }}</td>
            <td>{{ s.email }}</td>
            <td>{{ s.major }}</td>
            <td>{{ s.graduation_year }}</td>
            <td>
                <a href="{{ url_for('edit_student', student_id=s.student_id) }}">Edit</a>
                <form method="POST" action="{{ url_for('delete_student', student_id=s.student_id) }}" style="display:inline">
                    <button type="submit" onclick="return confirm('Delete student?')">Delete</button>
                </form>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
