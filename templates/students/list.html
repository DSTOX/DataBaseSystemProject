{% extends "base.html" %}
{% block content %}
<h1>Students</h1>

<form method="GET" action="{{ url_for('students') }}" style="margin-bottom:1rem; display:flex; gap:0.5rem;">
    <input name="search" placeholder="Search by name or major" value="{{ search }}" style="max-width:300px">
    <button type="submit" class="btn">Search</button>
    <a class="btn" href="{{ url_for('students') }}">Clear</a>
</form>

<a class="btn" href="{{ url_for('new_student') }}">+ New Student</a>
<table>
    <thead><tr><th>Name</th><th>Email</th><th>Major</th><th>Grad Year</th><th>Actions</th></tr></thead>
    <tbody>
    {% for s in students %}
        <tr>
            <td><a href="{{ url_for('student_detail', student_id=s.student_id) }}">{{ s.full_name }}</a></td>
            <td>{{ s.email }}</td>
            <td>{{ s.major }}</td>
            <td>{{ s.graduation_year }}</td>
            <td>
                <a href="{{ url_for('edit_student', student_id=s.student_id) }}">Edit</a>
                <form method="POST" action="{{ url_for('delete_student', student_id=s.student_id) }}" style="display:inline">
                    <button type="submit" onclick="return confirm('Delete student?')">Delete</button>
                </form>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
