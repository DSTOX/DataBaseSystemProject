{% extends "base.html" %}
{% block content %}
<h1>RSVP for: {{ event.title }}</h1>
<p><strong>Date:</strong> {{ event.event_date }} &nbsp;|&nbsp; <strong>Capacity:</strong> {{ event.capacity }}</p>
<p>If the event is full, the student will be automatically added to the waitlist.</p>
<form method="POST">
    <label>Select Student<br>
        <select name="student_id" required>
            <option value="">— Choose a student —</option>
            {% for s in students %}
                <option value="{{ s.student_id }}">{{ s.full_name }} ({{ s.email }})</option>
            {% endfor %}
        </select>
    </label>
    <button type="submit" class="btn">Submit RSVP</button>
    <a href="{{ url_for('event_detail', event_id=event.event_id) }}">Cancel</a>
</form>
{% endblock %}
